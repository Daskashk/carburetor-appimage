name: Build Carburetor AppImage (Fixed Keys)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: "0 0 */6 * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install appimage-builder
        run: |
          sudo apt-get update
          sudo apt-get install -y wget file desktop-file-utils
          wget -q https://github.com/AppImageCrafters/appimage-builder/releases/download/v1.1.0/appimage-builder-1.1.0-x86_64.AppImage
          chmod +x appimage-builder-1.1.0-x86_64.AppImage

      - name: Create AppImage Recipe
        run: |
          cat <<EOF > AppImageBuilder.yml
          version: 1
          script:
            - rm -rf AppDir || true
          AppDir:
            path: ./AppDir
            app_info:
              id: io.frama.tractor.carburetor
              name: Carburetor
              icon: io.frama.tractor.carburetor
              version: continuous
              exec: usr/bin/carburetor
              exec_args: \$@
            apt:
              arch: amd64
              sources:
                # Importamos la clave actual (Debian 12/Bookworm Archive Key)
                - sourceline: 'deb [arch=amd64] http://deb.debian.org/debian sid main'
                  key_url: 'https://ftp-master.debian.org/keys/archive-key-12.asc'
                # Importamos la clave anterior (Debian 10/Buster Archive Key) para compatibilidad
                - sourceline: 'deb [arch=amd64] http://deb.debian.org/debian sid main'
                  key_url: 'https://ftp-master.debian.org/keys/archive-key-10.asc'
              include:
                - carburetor
                - python3
                - gir1.2-gtk-4.0
                - gir1.2-adw-1
                - adwaita-icon-theme-full
                - libglib2.0-bin
            runtime:
              env:
                GSETTINGS_SCHEMA_DIR: '\$APPDIR/usr/share/glib-2.0/schemas'
                GTK_THEME: Adwaita
          AppImage:
            arch: x86_64
            file_name: carburetor-latest-x86_64.AppImage
          EOF

      - name: Build AppImage
        run: |
          ./appimage-builder-1.1.0-x86_64.AppImage --appimage-extract-and-run --recipe AppImageBuilder.yml

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: carburetor-appimage
          path: carburetor-latest-x86_64.AppImage

      - name: Release
        uses: softprops/action-gh-release@v1
        if: github.ref == 'refs/heads/main'
        with:
          name: "Continuous Build"
          tag_name: continuous-universal
          prerelease: false
          files: carburetor-latest-x86_64.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
