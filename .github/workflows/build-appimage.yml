name: Build Carburetor AppImage (Pip Method)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: "0 0 */6 * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: debian:sid

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          apt-get update
          apt-get install -y \
            wget \
            file \
            desktop-file-utils \
            gnupg \
            curl \
            ca-certificates \
            python3-pip \
            squashfs-tools \
            libglib2.0-bin

          # Preparamos las llaves GPG para apt
          gpg --keyring /usr/share/keyrings/debian-archive-keyring.gpg --export --armor > /tmp/debian-archive-key.asc

      - name: Download Official Carburetor Deb
        run: |
          wget -q "https://framagit.org/-/project/67091/uploads/35726bec322917933fa728781c0ece30/carburetor_5.1.1-1_all.deb"

      # Instalamos appimage-builder via pip (más fiable que el binario AppImage)
      - name: Install appimage-builder
        run: |
          pip3 install appimage-builder --break-system-packages

      - name: Create AppImage Recipe
        run: |
          cat <<EOF > AppImageBuilder.yml
          version: 1
          script:
            - rm -rf AppDir || true
            - mkdir -p AppDir
          AppDir:
            path: ./AppDir
            app_info:
              id: io.frama.tractor.carburetor
              name: Carburetor
              icon: io.frama.tractor.carburetor
              version: 5.1.1
              exec: usr/bin/python3
              exec_args: \$APPDIR/usr/bin/carburetor
            apt:
              arch: amd64
              sources:
                - sourceline: 'deb http://deb.debian.org/debian sid main'
                  key_url: 'file:///tmp/debian-archive-key.asc'
              include:
                - ./carburetor_5.1.1-1_all.deb
                - python3
                - python3-gi
                - python3-pycountry
                - gir1.2-gtk-4.0
                - gir1.2-adw-1
                - libadwaita-1-0
                - adwaita-icon-theme-full
                - tractor
                - tor
            runtime:
              env:
                PYTHONPATH: \$APPDIR/usr/lib/python3/dist-packages:\$PYTHONPATH
                GSETTINGS_SCHEMA_DIR: \$APPDIR/usr/share/glib-2.0/schemas
                GTK_THEME: Adwaita
          AppImage:
            arch: x86_64
            file_name: carburetor-5.1.1-x86_64.AppImage
          EOF

      - name: Build AppImage
        run: |
          appimage-builder --recipe AppImageBuilder.yml

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: carburetor-appimage
          path: carburetor-5.1.1-x86_64.AppImage

      - name: Release
        uses: softprops/action-gh-release@v1
        if: github.ref == 'refs/heads/main'
        with:
          name: "Carburetor 5.1.1"
          tag_name: v5.1.1-appimage
          prerelease: false
          files: carburetor-5.1.1-x86_64.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
